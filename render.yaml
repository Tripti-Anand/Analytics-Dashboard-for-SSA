services:
  - type: web
    name: ssa-backend
    env: python
    repo: https://github.com/Tripti-Anand/Analytics-Dashboard-for-SSA
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app.main:app -b 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GROQ_API_KEY
        sync: false
      - key: NASA_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
